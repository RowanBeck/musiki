<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Musiki - 300 Years of Music Evolution</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* HEADER */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 14px;
      z-index: 200;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      color: #58a6ff;
      letter-spacing: -0.03em;
      flex-shrink: 0;
    }

    .subtitle {
      font-size: 12px;
      color: #484f58;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #search-wrapper {
      position: relative;
      margin-left: auto;
    }

    #search-input {
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 13px;
      padding: 7px 14px 7px 36px;
      width: 240px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    #search-input:focus {
      border-color: #58a6ff;
      box-shadow: 0 0 0 3px rgba(88,166,255,0.1);
    }

    #search-input::placeholder { color: #484f58; }

    .search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: #484f58;
      pointer-events: none;
    }

    #search-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      max-height: 280px;
      overflow-y: auto;
      z-index: 300;
      display: none;
    }

    #search-dropdown.visible { display: block; }

    .search-item {
      padding: 9px 14px;
      cursor: pointer;
      font-size: 13px;
      color: #e6edf3;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #21262d;
    }

    .search-item:last-child { border-bottom: none; }
    .search-item:hover { background: #21262d; }

    .search-item-year {
      font-size: 11px;
      color: #484f58;
      background: #21262d;
      padding: 2px 7px;
      border-radius: 10px;
    }

    #fit-btn {
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 13px;
      padding: 7px 14px;
      cursor: pointer;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    #fit-btn:hover { background: #30363d; border-color: #484f58; }

    /* ERA FILTER */
    #era-filter {
      position: fixed;
      top: 56px; left: 0; right: 0;
      height: 40px;
      background: #0d1117;
      border-bottom: 1px solid #21262d;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 4px;
      z-index: 190;
      overflow-x: auto;
    }

    #era-filter::-webkit-scrollbar { height: 0; }

    .era-btn {
      background: transparent;
      border: 1px solid transparent;
      border-radius: 4px;
      color: #8b949e;
      font-size: 11px;
      font-weight: 500;
      padding: 4px 10px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .era-btn:hover { color: #e6edf3; border-color: #30363d; }

    .era-btn.active {
      background: #21262d;
      color: #58a6ff;
      border-color: #30363d;
    }

    /* MAIN CONTAINER */
    #main-container {
      position: fixed;
      top: 96px; left: 0; right: 0; bottom: 32px;
      display: flex;
      overflow: hidden;
    }

    /* LANE LABELS */
    #lane-labels {
      width: 150px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
      border-right: 1px solid #21262d;
      z-index: 50;
    }

    #lane-labels-inner {
      position: absolute;
      left: 0;
      top: 0;
      width: 150px;
      will-change: transform;
    }

    .lane-label-item {
      display: flex;
      align-items: center;
      padding-left: 14px;
      color: #58a6ff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      line-height: 1.3;
      overflow: hidden;
    }

    /* CANVAS */
    #canvas-wrapper {
      flex: 1;
      overflow: hidden;
      position: relative;
      cursor: grab;
      background: #0d1117;
    }

    #canvas-wrapper.grabbing { cursor: grabbing; }

    #timeline-svg { display: block; }

    /* NODE STYLES */
    .node { cursor: pointer; }
    .node circle { stroke: white; stroke-width: 1; transition: r 0.1s, stroke-width 0.1s; }
    .node:hover circle { stroke-width: 2; }
    .node.highlighted circle { stroke-width: 2.5; stroke: #fff; filter: drop-shadow(0 0 6px rgba(255,255,255,0.5)); }

    .node-label {
      fill: #aaa;
      font-size: 10px;
      pointer-events: none;
      text-anchor: middle;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .labels-hidden .node-label { display: none; }
    .labels-visible .node-label { display: block; }

    /* EDGE STYLES */
    .edge { fill: none; }

    /* DIM STATES */
    .node.dimmed circle { opacity: 0.08; }
    .node.dimmed text { opacity: 0.08; }
    .edge.dimmed { opacity: 0.03 !important; }

    /* GENRE PANEL */
    #genre-panel {
      width: 340px;
      flex-shrink: 0;
      background: #161b22;
      border-left: 1px solid #30363d;
      overflow-y: auto;
      transform: translateX(340px);
      transition: transform 0.22s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      z-index: 100;
    }

    #genre-panel.open { transform: translateX(0); }
    #genre-panel::-webkit-scrollbar { width: 4px; }
    #genre-panel::-webkit-scrollbar-track { background: transparent; }
    #genre-panel::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

    #panel-content { padding: 24px 20px 32px; }

    #panel-close {
      position: sticky;
      top: 12px;
      float: right;
      margin-bottom: -28px;
      margin-right: 0;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #8b949e;
      cursor: pointer;
      padding: 5px 7px;
      line-height: 0;
      transition: all 0.15s;
      z-index: 10;
    }

    #panel-close:hover { color: #e6edf3; background: #30363d; }

    .panel-title {
      font-size: 22px;
      font-weight: 700;
      color: #e6edf3;
      margin-bottom: 14px;
      padding-right: 36px;
      line-height: 1.2;
    }

    .panel-badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
    }

    .badge-era { color: #0d1117; }
    .badge-origin { background: #21262d; color: #8b949e; border: 1px solid #30363d; }
    .badge-lane { background: rgba(88,166,255,0.1); color: #58a6ff; border: 1px solid rgba(88,166,255,0.2); }

    .panel-description {
      font-size: 13px;
      color: #8b949e;
      line-height: 1.7;
      margin-bottom: 22px;
    }

    .panel-section { margin-bottom: 18px; }

    .panel-section-title {
      font-size: 10px;
      font-weight: 700;
      color: #484f58;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 9px;
    }

    .chips { display: flex; flex-wrap: wrap; gap: 6px; }

    .chip {
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 4px;
      color: #58a6ff;
      font-size: 12px;
      padding: 4px 10px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .chip:hover { background: #30363d; border-color: #484f58; }

    .panel-list { list-style: none; }

    .panel-list li {
      font-size: 13px;
      color: #8b949e;
      padding: 6px 0;
      border-bottom: 1px solid #21262d;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-list li:last-child { border-bottom: none; }

    .list-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .spotify-embed {
      margin-top: 6px;
      border-radius: 8px;
      overflow: hidden;
    }

    /* TOOLTIP */
    #tooltip {
      position: fixed;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: #e6edf3;
      pointer-events: none;
      z-index: 500;
      display: none;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }

    .tooltip-name { font-weight: 600; font-size: 13px; margin-bottom: 3px; }
    .tooltip-meta { color: #8b949e; font-size: 11px; }

    /* STATS BAR */
    #stats-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 32px;
      background: #161b22;
      border-top: 1px solid #30363d;
      display: flex;
      align-items: center;
      padding: 0 20px;
      font-size: 11px;
      color: #484f58;
      z-index: 200;
      gap: 12px;
    }

    .stats-sep { color: #21262d; }
    #selected-info { margin-left: auto; color: #58a6ff; font-weight: 500; }
    #zoom-info { color: #30363d; font-size: 10px; }

    /* SVG AXIS */
    .axis-text { fill: #555; font-family: system-ui, -apple-system, sans-serif; }
    .grid-line { stroke: #ffffff; stroke-opacity: 0.04; }
    .axis-line { stroke: #30363d; }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <span class="logo">Musiki</span>
    <span class="subtitle">300 years of music evolution</span>
    <div id="search-wrapper">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="search-input" placeholder="Search genres..." autocomplete="off" spellcheck="false">
      <div id="search-dropdown"></div>
    </div>
    <button id="fit-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
      </svg>
      Fit
    </button>
  </div>

  <div id="era-filter">
    <button class="era-btn active" data-era="all">All</button>
    <button class="era-btn" data-era="pre-1900">Pre-1900</button>
    <button class="era-btn" data-era="1900s">1900s</button>
    <button class="era-btn" data-era="1920s">1920s</button>
    <button class="era-btn" data-era="1940s">1940s</button>
    <button class="era-btn" data-era="1950s">1950s</button>
    <button class="era-btn" data-era="1960s">1960s</button>
    <button class="era-btn" data-era="1970s">1970s</button>
    <button class="era-btn" data-era="1980s">1980s</button>
    <button class="era-btn" data-era="1990s">1990s</button>
    <button class="era-btn" data-era="2000s">2000s</button>
    <button class="era-btn" data-era="2010s">2010s</button>
  </div>

  <div id="main-container">
    <div id="lane-labels">
      <div id="lane-labels-inner"></div>
    </div>
    <div id="canvas-wrapper">
      <svg id="timeline-svg"></svg>
    </div>
    <div id="genre-panel">
      <button id="panel-close" aria-label="Close panel">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
      <div id="panel-content"></div>
    </div>
  </div>

  <div id="stats-bar">
    <span id="genre-count">80 genres</span>
    <span class="stats-sep">|</span>
    <span>10 genre families</span>
    <span class="stats-sep">|</span>
    <span>1750 to 2025</span>
    <span id="zoom-info"></span>
    <span id="selected-info"></span>
  </div>
</div>

<div id="tooltip">
  <div class="tooltip-name" id="tt-name"></div>
  <div class="tooltip-meta" id="tt-meta"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js" integrity="sha512-/9DkBLJGGjyoExK2/1GNmJvUlm8hBBGCaXBCmFbf4mTbwC2GOb0VDyOFKoMp5ILl/bJQkEFuXRHH5lMFCMrA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script>
(function() {
  // ─── CONSTANTS ───────────────────────────────────────────────────────────────
  const SVG_WIDTH    = 3200;
  const AXIS_HEIGHT  = 64;
  const LANE_HEIGHT  = 100;
  const LANE_COUNT   = 10;
  const LEFT_MARGIN  = 10; // labels are overlaid, not in SVG margin
  const SVG_HEIGHT   = AXIS_HEIGHT + LANE_COUNT * LANE_HEIGHT;

  const LANE_NAMES = [
    'Classical & European',
    'Blues & R&B',
    'Folk & Country',
    'Gospel',
    'Jazz',
    'Caribbean & Reggae',
    'Rock & Metal',
    'Electronic & Club',
    'Hip-Hop & Urban',
    'Pop & Global'
  ];

  const LANE_COLORS = [
    '#a78bfa', // 0 Classical
    '#60a5fa', // 1 Blues
    '#34d399', // 2 Folk
    '#fbbf24', // 3 Gospel
    '#f97316', // 4 Jazz
    '#2dd4bf', // 5 Caribbean
    '#f87171', // 6 Rock
    '#818cf8', // 7 Electronic
    '#fb923c', // 8 Hip-Hop
    '#e879f9', // 9 Pop
  ];

  // Explicit lane assignments
  const LANE_EXPLICIT = {
    // Lane 0: Classical & European
    'classical': 0,
    // Lane 1: Blues & R&B
    'blues': 1, 'rhythm-and-blues': 1, 'soul': 1, 'funk': 1,
    'motown': 1, 'neo-soul': 1, 'new-jack-swing': 1,
    // Lane 2: Folk & Country
    'folk': 2, 'country': 2, 'bluegrass': 2, 'mento': 2,
    // Lane 3: Gospel
    'gospel': 3,
    // Lane 4: Jazz
    'jazz': 4, 'bebop': 4, 'modal-jazz': 4, 'free-jazz': 4,
    'fusion': 4, 'jazz-rap': 4, 'bossa-nova': 4, 'samba': 4,
    // Lane 5: Caribbean & Reggae
    'ska': 5, 'reggae': 5, 'dub': 5, 'dancehall': 5,
    'garage-uk': 5, 'grime': 5, 'dubstep': 5,
    // Lane 6: Rock & Metal
    'rock-and-roll': 6, 'classic-rock': 6, 'psychedelic-rock': 6,
    'progressive-rock': 6, 'hard-rock': 6, 'heavy-metal': 6,
    'thrash-metal': 6, 'metal-thrash': 6, 'death-metal': 6,
    'black-metal': 6, 'punk-rock': 6, 'new-wave': 6,
    'post-punk': 6, 'synthpop': 6, 'alternative-rock': 6,
    'grunge': 6, 'indie-rock': 6, 'indie-pop': 6,
    'shoegaze': 6, 'dream-pop': 6, 'emo': 6,
    'post-rock': 6, 'math-rock': 6, 'glam-rock': 6,
    // Lane 7: Electronic & Club
    'electronic': 7, 'disco': 7, 'house': 7, 'deep-house': 7,
    'techno': 7, 'trance': 7, 'drum-and-bass': 7, 'jungle': 7,
    'ambient': 7, 'idm': 7, 'progressive-house': 7, 'happy-hardcore': 7,
    // Lane 8: Hip-Hop & Urban
    'hip-hop': 8, 'gangsta-rap': 8, 'conscious-hip-hop': 8,
    'trap': 8, 'reggaeton': 8, 'reaggeton': 8,
    // Lane 9: Pop & Global
    'pop': 9, 'k-pop': 9, 'latin-pop': 9, 'afrobeats': 9,
    'afrobeat': 9, 'highlife': 9, 'amapiano': 9, 'cumbia': 9,
    'salsa': 9, 'flamenco': 9, 'indian-classical': 9
  };

  function getEraColor(year) {
    if (year < 1900) return '#8B4513';
    if (year < 1930) return '#CD853F';
    if (year < 1950) return '#DAA520';
    if (year < 1960) return '#4169E1';
    if (year < 1970) return '#9370DB';
    if (year < 1980) return '#FF8C00';
    if (year < 1990) return '#FF1493';
    if (year < 2000) return '#00CED1';
    if (year < 2010) return '#32CD32';
    return '#FF6347';
  }

  function getDecadeLabel(year) {
    if (year < 1900) return 'Pre-1900';
    return Math.floor(year / 10) * 10 + 's';
  }

  function getEraKey(year) {
    if (year < 1900) return 'pre-1900';
    return Math.floor(year / 10) * 10 + 's';
  }

  function assignLane(genre, genreMap, visited = new Set()) {
    if (LANE_EXPLICIT[genre.id] !== undefined) return LANE_EXPLICIT[genre.id];
    if (visited.has(genre.id)) return 9;
    visited.add(genre.id);
    for (const pid of (genre.parent_ids || [])) {
      const parent = genreMap[pid];
      if (parent) {
        const lane = assignLane(parent, genreMap, visited);
        if (lane !== undefined) return lane;
      }
    }
    return 9;
  }

  // ─── LOAD & RENDER ───────────────────────────────────────────────────────────
  fetch('data/genres.json')
    .then(r => r.json())
    .then(genres => init(genres))
    .catch(err => {
      document.getElementById('canvas-wrapper').innerHTML =
        '<div style="color:#f87171;padding:40px;font-size:14px">Failed to load genre data: ' + err.message + '</div>';
    });

  function init(genres) {
    // Build lookup map
    const genreMap = {};
    genres.forEach(g => { genreMap[g.id] = g; });

    // Assign lanes
    genres.forEach(g => {
      g.lane = assignLane(g, genreMap);
    });

    // Time scale
    const TIME_START = 1750;
    const TIME_END   = 2025;
    const X_LEFT  = 20;
    const X_RIGHT = SVG_WIDTH - 30;

    const timeScale = d3.scaleLinear()
      .domain([TIME_START, TIME_END])
      .range([X_LEFT, X_RIGHT]);

    // Group by lane+year for vertical distribution
    const laneYearGroups = {};
    genres.forEach(g => {
      const key = `${g.lane}:${g.origin_year}`;
      if (!laneYearGroups[key]) laneYearGroups[key] = [];
      laneYearGroups[key].push(g);
    });

    // Sort each group by id for stable ordering
    Object.values(laneYearGroups).forEach(grp => grp.sort((a, b) => a.id < b.id ? -1 : 1));

    // Assign positions
    genres.forEach(g => {
      const key = `${g.lane}:${g.origin_year}`;
      const group = laneYearGroups[key];
      const idx = group.findIndex(x => x.id === g.id);
      const n = group.length;
      const spacing = Math.min(20, (LANE_HEIGHT - 26) / Math.max(n, 1));
      const laneTop = AXIS_HEIGHT + g.lane * LANE_HEIGHT;
      const laneMid = laneTop + LANE_HEIGHT / 2;
      g.x = timeScale(g.origin_year);
      g.y = laneMid + (idx - (n - 1) / 2) * spacing;
    });

    // ─── SVG SETUP ─────────────────────────────────────────────────────────────
    const svg = d3.select('#timeline-svg')
      .attr('width', SVG_WIDTH)
      .attr('height', SVG_HEIGHT);

    // Lane background rects
    const bgGroup = svg.append('g').attr('class', 'bg-group');
    for (let i = 0; i < LANE_COUNT; i++) {
      bgGroup.append('rect')
        .attr('x', 0)
        .attr('y', AXIS_HEIGHT + i * LANE_HEIGHT)
        .attr('width', SVG_WIDTH)
        .attr('height', LANE_HEIGHT)
        .attr('fill', i % 2 === 0 ? '#0d1117' : '#0f1419');
    }

    // Subtle lane separator lines
    for (let i = 1; i < LANE_COUNT; i++) {
      bgGroup.append('line')
        .attr('x1', 0).attr('x2', SVG_WIDTH)
        .attr('y1', AXIS_HEIGHT + i * LANE_HEIGHT)
        .attr('y2', AXIS_HEIGHT + i * LANE_HEIGHT)
        .attr('stroke', '#1c2128')
        .attr('stroke-width', 1);
    }

    // Main zoomable group
    const mainGroup = svg.append('g').attr('id', 'main-group');

    // ─── AXIS ──────────────────────────────────────────────────────────────────
    const axisGroup = mainGroup.append('g').attr('id', 'axis-group');

    const decadeTicks = [];
    for (let y = 1750; y <= 2025; y += 10) decadeTicks.push(y);

    const allTicks = [
      1750, 1800, 1850, 1900, 1910, 1920, 1930, 1940,
      1950, 1960, 1970, 1975, 1980, 1985, 1990, 1995,
      2000, 2005, 2010, 2015, 2020, 2025
    ];

    // Grid lines at decades
    decadeTicks.forEach(yr => {
      axisGroup.append('line')
        .attr('class', 'grid-line')
        .attr('x1', timeScale(yr)).attr('x2', timeScale(yr))
        .attr('y1', AXIS_HEIGHT).attr('y2', SVG_HEIGHT);
    });

    // Axis baseline
    axisGroup.append('line')
      .attr('class', 'axis-line')
      .attr('x1', 0).attr('x2', SVG_WIDTH)
      .attr('y1', AXIS_HEIGHT).attr('y2', AXIS_HEIGHT);

    // Tick marks and labels
    allTicks.forEach(yr => {
      const x = timeScale(yr);
      const isMajor = yr % 50 === 0;
      const isMid = yr % 10 === 0;
      const tickLen = isMajor ? 10 : isMid ? 7 : 4;

      axisGroup.append('line')
        .attr('x1', x).attr('x2', x)
        .attr('y1', AXIS_HEIGHT - tickLen).attr('y2', AXIS_HEIGHT)
        .attr('stroke', isMajor ? '#555' : '#3a3f47')
        .attr('stroke-width', 1);

      if (isMid) {
        axisGroup.append('text')
          .attr('class', 'axis-text')
          .attr('x', x)
          .attr('y', AXIS_HEIGHT - tickLen - 5)
          .attr('text-anchor', 'middle')
          .attr('font-size', isMajor ? '12px' : '10px')
          .attr('fill', isMajor ? '#666' : '#3a3f47')
          .text(yr);
      }
    });

    // ─── EDGES ─────────────────────────────────────────────────────────────────
    const edgeGroup = mainGroup.append('g').attr('id', 'edges');

    genres.forEach(child => {
      (child.parent_ids || []).forEach(pid => {
        const parent = genreMap[pid];
        if (!parent || parent.x === undefined) return;

        const x1 = parent.x, y1 = parent.y;
        const x2 = child.x,  y2 = child.y;

        // Always flow left-to-right in bezier control points
        const minX = Math.min(x1, x2);
        const maxX = Math.max(x1, x2);
        const dx = maxX - minX;
        const cp1x = x1 + (x2 - x1) / 3;
        const cp2x = x2 - (x2 - x1) / 3;

        edgeGroup.append('path')
          .attr('class', `edge edge-child-${child.id} edge-parent-${pid}`)
          .attr('d', `M ${x1} ${y1} C ${cp1x} ${y1} ${cp2x} ${y2} ${x2} ${y2}`)
          .attr('stroke', getEraColor(child.origin_year))
          .attr('stroke-opacity', 0.35)
          .attr('stroke-width', 1.5)
          .datum({ childId: child.id, parentId: pid });
      });
    });

    // ─── NODES ─────────────────────────────────────────────────────────────────
    const nodeGroup = mainGroup.append('g').attr('id', 'nodes').attr('class', 'labels-hidden');

    const tooltip = document.getElementById('tooltip');
    const ttName  = document.getElementById('tt-name');
    const ttMeta  = document.getElementById('tt-meta');

    let selectedId = null;

    const nodeEls = nodeGroup.selectAll('.node')
      .data(genres, d => d.id)
      .enter()
      .append('g')
      .attr('class', d => `node node-${d.id}`)
      .attr('transform', d => `translate(${d.x}, ${d.y})`);

    nodeEls.append('circle')
      .attr('r', d => d.parent_ids.length === 0 ? 7 : 5)
      .attr('fill', d => getEraColor(d.origin_year))
      .attr('stroke', 'white')
      .attr('stroke-width', 1)
      .on('mouseover', function(event, d) {
        if (selectedId !== d.id) {
          ttName.textContent = d.name;
          ttMeta.textContent = d.origin_year + ' · ' + d.region;
          tooltip.style.display = 'block';
        }
      })
      .on('mousemove', function(event) {
        tooltip.style.left = (event.clientX + 16) + 'px';
        tooltip.style.top  = (event.clientY - 36) + 'px';
      })
      .on('mouseleave', function() {
        tooltip.style.display = 'none';
      })
      .on('click', function(event, d) {
        event.stopPropagation();
        tooltip.style.display = 'none';
        openPanel(d);
      });

    nodeEls.append('text')
      .attr('class', 'node-label')
      .attr('y', d => (d.parent_ids.length === 0 ? 7 : 5) + 13)
      .text(d => d.name);

    // ─── LANE LABELS (DOM overlay) ────────────────────────────────────────────
    const labelsInner = document.getElementById('lane-labels-inner');
    const labelDivs = [];

    for (let i = 0; i < LANE_COUNT; i++) {
      const div = document.createElement('div');
      div.className = 'lane-label-item';
      div.style.position = 'absolute';
      div.style.left = '0';
      div.style.right = '0';
      div.style.color = LANE_COLORS[i];
      div.style.background = i % 2 === 0 ? '#0d1117' : '#0f1419';
      div.textContent = LANE_NAMES[i];
      labelsInner.appendChild(div);
      labelDivs.push(div);
    }

    function updateLaneLabels(transform) {
      const k = transform.k;
      const ty = transform.y;
      labelDivs.forEach((div, i) => {
        const svgTop = AXIS_HEIGHT + i * LANE_HEIGHT;
        const screenTop = svgTop * k + ty;
        const screenH = LANE_HEIGHT * k;
        div.style.top    = screenTop + 'px';
        div.style.height = screenH + 'px';
        const fs = Math.max(8, Math.min(11, 10 * Math.sqrt(k)));
        div.style.fontSize = fs + 'px';
        div.style.opacity = k < 0.25 ? '0' : '1';
      });
    }

    // ─── ZOOM ──────────────────────────────────────────────────────────────────
    const canvasWrapper = document.getElementById('canvas-wrapper');

    const zoom = d3.zoom()
      .scaleExtent([0.25, 5])
      .on('zoom', onZoom)
      .on('start', () => canvasWrapper.classList.add('grabbing'))
      .on('end',   () => canvasWrapper.classList.remove('grabbing'));

    svg.call(zoom);
    svg.on('dblclick.zoom', null);

    let currentK = 1;

    function onZoom(event) {
      const t = event.transform;
      currentK = t.k;
      mainGroup.attr('transform', t);
      bgGroup.attr('transform', t);
      updateLaneLabels(t);

      // Toggle labels
      const showLabels = t.k > 0.7;
      nodeGroup.classed('labels-visible', showLabels).classed('labels-hidden', !showLabels);

      // Zoom indicator
      document.getElementById('zoom-info').textContent = Math.round(t.k * 100) + '%';
    }

    function fitTimeline() {
      const cw = canvasWrapper.clientWidth;
      const ch = canvasWrapper.clientHeight;
      const scaleX = cw / SVG_WIDTH;
      const scaleY = ch / SVG_HEIGHT;
      const scale = Math.min(scaleX, scaleY) * 0.97;
      const tx = (cw - SVG_WIDTH * scale) / 2;
      const ty = (ch - SVG_HEIGHT * scale) / 2;
      svg.transition().duration(500)
        .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
    }

    document.getElementById('fit-btn').addEventListener('click', fitTimeline);
    svg.on('click', closePanel);

    // Initial fit
    setTimeout(fitTimeline, 80);

    // ─── PANEL ─────────────────────────────────────────────────────────────────
    const genrePanel   = document.getElementById('genre-panel');
    const panelContent = document.getElementById('panel-content');
    const selectedInfo = document.getElementById('selected-info');

    function openPanel(genre) {
      selectedId = genre.id;
      tooltip.style.display = 'none';

      // Highlight node
      d3.selectAll('.node').classed('highlighted', false);
      d3.select(`.node-${genre.id}`).classed('highlighted', true);

      selectedInfo.textContent = genre.name;

      const children = genres.filter(g => g.parent_ids.includes(genre.id));
      const eraColor = getEraColor(genre.origin_year);
      const lane = genre.lane;

      const parentChips = (genre.parent_ids || []).map(pid => {
        const p = genreMap[pid];
        return p ? `<span class="chip" data-id="${pid}">${p.name}</span>` : '';
      }).join('');

      const childChips = children.map(c =>
        `<span class="chip" data-id="${c.id}">${c.name}</span>`
      ).join('');

      const artistItems = (genre.key_artists || []).map(a =>
        `<li><span class="list-dot" style="background:${eraColor}"></span>${a}</li>`
      ).join('');

      const trackItems = (genre.key_tracks || []).map(t =>
        `<li><span class="list-dot" style="background:#484f58"></span>${t}</li>`
      ).join('');

      const spotifyHTML = genre.spotify_track_id ? `
        <div class="panel-section">
          <div class="panel-section-title">Listen</div>
          <div class="spotify-embed">
            <iframe src="https://open.spotify.com/embed/track/${genre.spotify_track_id}"
              width="100%" height="80" frameborder="0"
              allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
              loading="lazy"></iframe>
          </div>
        </div>` : '';

      panelContent.innerHTML = `
        <h2 class="panel-title">${genre.name}</h2>
        <div class="panel-badges">
          <span class="badge badge-era" style="background:${eraColor}">${getDecadeLabel(genre.origin_year)}</span>
          <span class="badge badge-origin">${genre.origin_year} &middot; ${genre.region}</span>
          <span class="badge badge-lane" style="color:${LANE_COLORS[lane]};border-color:${LANE_COLORS[lane]}30;background:${LANE_COLORS[lane]}12">${LANE_NAMES[lane]}</span>
        </div>
        ${genre.description ? `<p class="panel-description">${genre.description.replace(/\n\n/g, '</p><p class="panel-description" style="margin-top:-10px">').replace(/\n/g, ' ')}</p>` : ''}
        ${parentChips ? `
          <div class="panel-section">
            <div class="panel-section-title">Evolved From</div>
            <div class="chips">${parentChips}</div>
          </div>` : ''}
        ${childChips ? `
          <div class="panel-section">
            <div class="panel-section-title">Led To</div>
            <div class="chips">${childChips}</div>
          </div>` : ''}
        ${artistItems ? `
          <div class="panel-section">
            <div class="panel-section-title">Key Artists</div>
            <ul class="panel-list">${artistItems}</ul>
          </div>` : ''}
        ${trackItems ? `
          <div class="panel-section">
            <div class="panel-section-title">Key Tracks</div>
            <ul class="panel-list">${trackItems}</ul>
          </div>` : ''}
        ${spotifyHTML}
      `;

      // Chip navigation
      panelContent.querySelectorAll('.chip[data-id]').forEach(chip => {
        chip.addEventListener('click', e => {
          e.stopPropagation();
          const g = genreMap[chip.dataset.id];
          if (g) openPanel(g);
        });
      });

      genrePanel.classList.add('open');
    }

    function closePanel(event) {
      if (event && event.target && event.target.closest && event.target.closest('#genre-panel')) return;
      genrePanel.classList.remove('open');
      d3.selectAll('.node').classed('highlighted', false);
      selectedId = null;
      selectedInfo.textContent = '';
      resetFilter();
    }

    document.getElementById('panel-close').addEventListener('click', e => {
      e.stopPropagation();
      closePanel();
    });

    // ─── FILTER LOGIC ──────────────────────────────────────────────────────────
    let activeEra    = 'all';
    let searchTerm   = '';

    function nodeVisible(d) {
      const eraOk = activeEra === 'all' || getEraKey(d.origin_year) === activeEra;
      const searchOk = !searchTerm || d.name.toLowerCase().includes(searchTerm) || d.id.includes(searchTerm);
      return eraOk && searchOk;
    }

    function applyFilter() {
      d3.selectAll('.node').each(function(d) {
        d3.select(this).classed('dimmed', !nodeVisible(d));
      });
      d3.selectAll('.edge').each(function(d) {
        if (!d) return;
        const child = genreMap[d.childId];
        const show = child && nodeVisible(child);
        d3.select(this).classed('dimmed', !show);
      });
    }

    function resetFilter() {
      if (activeEra === 'all' && !searchTerm) {
        d3.selectAll('.node').classed('dimmed', false);
        d3.selectAll('.edge').classed('dimmed', false);
      }
    }

    // Era buttons
    document.querySelectorAll('.era-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.era-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeEra = btn.dataset.era;
        applyFilter();
      });
    });

    // ─── SEARCH ────────────────────────────────────────────────────────────────
    const searchInput    = document.getElementById('search-input');
    const searchDropdown = document.getElementById('search-dropdown');

    searchInput.addEventListener('input', () => {
      searchTerm = searchInput.value.trim().toLowerCase();

      if (searchTerm.length < 1) {
        searchDropdown.classList.remove('visible');
        searchTerm = '';
        applyFilter();
        return;
      }

      const matches = genres
        .filter(g => g.name.toLowerCase().includes(searchTerm) || g.id.includes(searchTerm))
        .sort((a, b) => {
          const aStarts = a.name.toLowerCase().startsWith(searchTerm) ? 0 : 1;
          const bStarts = b.name.toLowerCase().startsWith(searchTerm) ? 0 : 1;
          return aStarts - bStarts || a.name.localeCompare(b.name);
        })
        .slice(0, 10);

      if (matches.length > 0) {
        searchDropdown.innerHTML = matches.map(g =>
          `<div class="search-item" data-id="${g.id}">
            <span>${g.name}</span>
            <span class="search-item-year">${g.origin_year}</span>
          </div>`
        ).join('');
        searchDropdown.classList.add('visible');

        searchDropdown.querySelectorAll('.search-item').forEach(item => {
          item.addEventListener('click', () => {
            const g = genreMap[item.dataset.id];
            if (g) {
              openPanel(g);
              searchDropdown.classList.remove('visible');
              searchInput.value = '';
              searchTerm = '';
              applyFilter();
            }
          });
        });
      } else {
        searchDropdown.classList.remove('visible');
      }

      applyFilter();
    });

    document.addEventListener('click', e => {
      if (!document.getElementById('search-wrapper').contains(e.target)) {
        searchDropdown.classList.remove('visible');
      }
    });

    searchInput.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        searchDropdown.classList.remove('visible');
        searchInput.value = '';
        searchTerm = '';
        applyFilter();
      }
    });

    // ─── KEYBOARD SHORTCUTS ────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && selectedId) closePanel();
      if ((e.key === 'f' || e.key === 'F') && !e.target.matches('input')) fitTimeline();
      if (e.key === '/' && !e.target.matches('input')) {
        e.preventDefault();
        searchInput.focus();
      }
    });

  } // end init()
})();
</script>
</body>
</html>
