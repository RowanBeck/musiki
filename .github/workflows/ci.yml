name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate genre data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate genres.json
        run: |
          echo "Validating docs/data/genres.json..."
          python3 -c "
          import json, sys
          with open('docs/data/genres.json') as f:
              data = json.load(f)
          assert isinstance(data, list), 'Expected a JSON array'
          required = ['id', 'name', 'parent_ids', 'origin_year', 'origin_decade', 'region', 'description']
          errors = []
          ids = set()
          for i, genre in enumerate(data):
              for field in required:
                  if field not in genre:
                      errors.append(f'Genre {i} missing field: {field}')
              if 'id' in genre:
                  if genre['id'] in ids:
                      errors.append(f'Duplicate id: {genre[\"id\"]}')
                  ids.add(genre['id'])
          # Validate parent_ids reference valid ids
          for genre in data:
              for pid in genre.get('parent_ids', []):
                  if pid not in ids:
                      errors.append(f'Genre {genre[\"id\"]} references unknown parent: {pid}')
          if errors:
              print('Validation errors:')
              for e in errors:
                  print(f'  - {e}')
              sys.exit(1)
          print(f'OK: {len(data)} genres validated, {len(ids)} unique ids')
          "

      - name: Check HTML exists
        run: |
          test -f docs/index.html && echo "OK: docs/index.html exists" || (echo "MISSING: docs/index.html" && exit 1)

      - name: Check CNAME
        run: |
          test -f docs/CNAME && echo "OK: docs/CNAME exists ($(cat docs/CNAME))" || echo "WARNING: docs/CNAME missing"
